{% extends 'base.html' %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container text-center py-5">
        <i class="bi bi-exclamation-triangle text-warning" style="font-size: 6rem;"></i>
        <h1 class="display-1 fw-bold text-warning">404</h1>
        <h2 class="fw-bold mb-3">Page Not Found</h2>
        <p class="text-muted mb-4">The page you are looking for does not exist or has been moved.</p>
        <div class="d-flex gap-3 justify-content-center">
            <a href="/" class="btn btn-primary btn-lg">
                <i class="bi bi-house"></i> Go Home
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg">
                <i class="bi bi-arrow-left"></i> Go Back
            </a>
        </div>
    </div>
</section>
{% endblock %}
