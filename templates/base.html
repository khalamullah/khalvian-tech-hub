<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Khalvian Tech Hub{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body data-authenticated="{% if user.is_authenticated %}true{% else %}false{% endif %}"
      data-device-id="{% block device_id %}{% endblock %}">

    {% include 'partials/_navbar.html' %}
    {% include 'partials/_messages.html' %}

    <!-- Toast Container for real-time notifications -->
    <div id="toast-container" 
         style="position: fixed; top: 80px; right: 20px; z-index: 9999; min-width: 300px;">
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/_footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/websocket.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
