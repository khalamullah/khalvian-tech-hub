{% extends 'base.html' %}

{% block title %}Delete Post - Khalvian Tech Hub{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm p-4 text-center">
                    <i class="bi bi-trash text-danger mb-3" style="font-size: 4rem;"></i>
                    <h3 class="fw-bold mb-3">Delete Post</h3>
                    <p class="text-muted mb-4">
                        Are you sure you want to delete <strong>{{ post.title }}</strong>? 
                        This action cannot be undone.
                    </p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex gap-3 justify-content-center">
                            <button type="submit" class="btn btn-danger btn-lg">
                                <i class="bi bi-trash"></i> Yes, Delete
                            </button>
                            <a href="{% url 'blog' %}" class="btn btn-outline-secondary btn-lg">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
