{% extends 'base.html' %}

{% block title %}{{ action }} Post - Khalvian Tech Hub{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">{{ action }} Blog Post</h2>
                    <a href="{% url 'blog' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Back to Blog
                    </a>
                </div>
                <div class="card border-0 shadow-sm p-4">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Title</label>
                            <input type="text" name="title" class="form-control" 
                                   value="{{ form.instance.title }}" placeholder="Post Title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Category</label>
                            <select name="category" class="form-select">
                                <option value="">-- No Category --</option>
                                {% for cat in form.fields.category.queryset %}
                                <option value="{{ cat.pk }}" 
                                    {% if form.instance.category_id == cat.pk %}selected{% endif %}>
                                    {{ cat.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Cover Image</label>
                            <input type="file" name="cover_image" class="form-control" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Content</label>
                            <textarea name="body" class="form-control" rows="12" 
                                      placeholder="Write your post here..." required>{{ form.instance.body }}</textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Status</label>
                            <select name="status" class="form-select">
                                <option value="draft" {% if form.instance.status == 'draft' %}selected{% endif %}>Draft</option>
                                <option value="published" {% if form.instance.status == 'published' %}selected{% endif %}>Published</option>
                            </select>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-save"></i> {{ action }} Post
                            </button>
                            <a href="{% url 'blog' %}" class="btn btn-outline-secondary btn-lg">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
