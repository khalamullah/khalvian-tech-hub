{% extends 'base.html' %}

{% block title %}Contact - Khalvian Tech Hub{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="text-center mb-5">
                    <h1 class="fw-bold">Contact Us</h1>
                    <p class="lead text-muted">Have a question? We would love to hear from you.</p>
                </div>
                <div class="card border-0 shadow-sm p-4">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Full Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Your Full Name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="Your Email Address" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Subject</label>
                            <input type="text" name="subject" class="form-control" placeholder="Subject" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Message</label>
                            <textarea name="message" class="form-control" rows="6" placeholder="Your message..." required></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-send"></i> Send Message
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Contact Info -->
        <div class="row g-4 mt-4 text-center">
            <div class="col-md-4">
                <i class="bi bi-envelope text-primary mb-2" style="font-size: 2rem;"></i>
                <h6 class="fw-bold">Email</h6>
                <p class="text-muted">info@khalvian.com</p>
            </div>
            <div class="col-md-4">
                <i class="bi bi-telephone text-primary mb-2" style="font-size: 2rem;"></i>
                <h6 class="fw-bold">Phone</h6>
                <p class="text-muted">+1 (555) 000-0000</p>
            </div>
            <div class="col-md-4">
                <i class="bi bi-geo-alt text-primary mb-2" style="font-size: 2rem;"></i>
                <h6 class="fw-bold">Location</h6>
                <p class="text-muted">Tech City, TC 00000</p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
